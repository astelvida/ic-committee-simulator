<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Adversarial IC — Investment Committee Simulator</title>
<style>
  html,body{margin:0;background:#F4F0E6;color:#181510;font-family:"IBM Plex Sans",system-ui,sans-serif}
  #dc-boot-status{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:10px;font-family:ui-monospace,"JetBrains Mono",monospace;font-size:13px;color:#6C665A}
  #dc-boot-status .err{color:#E23B2C;max-width:520px;text-align:center;line-height:1.5;padding:0 20px}
  @keyframes b{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .d{display:inline-block;width:7px;height:7px;border-radius:50%;background:#5B4BE0;margin:0 2px;animation:b 1.3s infinite}
  .d:nth-child(2){animation-delay:.2s}.d:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>
<div id="dc-boot-status">
  <div>convening the investment committee</div>
  <div><span class="d"></span><span class="d"></span><span class="d"></span></div>
</div>
<script>
(function () {
  // Branch-pinned source: the committee simulator's DC template + runtime are
  // served from jsDelivr off the public repo, so this Vercel entry stays tiny.
  var BASE = "https://cdn.jsdelivr.net/gh/astelvida/ic-committee-simulator@claude/adversarial-ic-design-16u4le/";
  var DC_FILE = "Adversarial%20IC.dc.html";
  function fail(msg) {
    var s = document.getElementById("dc-boot-status");
    if (s) s.innerHTML = '<div class="err">Could not load the committee.<br>' + msg + "</div>";
  }
  // Skip the runtime's own location.href re-fetch (this bootstrap page has no <x-dc>).
  window.__resources = true;
  fetch(BASE + DC_FILE)
    .then(function (r) { if (!r.ok) throw new Error("source " + r.status); return r.text(); })
    .then(function (src) {
      var doc = new DOMParser().parseFromString(src, "text/html");
      var xdc = doc.querySelector("x-dc");
      var logic = doc.querySelector("script[data-dc-script]");
      if (!xdc || !logic) throw new Error("malformed component source");
      // Move the template (incl. <helmet>) into this document, ahead of boot.
      document.body.appendChild(document.importNode(xdc, true));
      var s = document.createElement("script");
      s.type = "text/x-dc";
      s.setAttribute("data-dc-script", "");
      var props = logic.getAttribute("data-props");
      if (props) s.setAttribute("data-props", props);
      s.textContent = logic.textContent;
      document.body.appendChild(s);
      // Load the DC runtime; it auto-boots against the now-present <x-dc>.
      var rt = document.createElement("script");
      rt.src = BASE + "support.js";
      rt.onload = function () {
        var st = document.getElementById("dc-boot-status");
        if (st) st.remove();
      };
      rt.onerror = function () { fail("runtime failed to load"); };
      document.head.appendChild(rt);
    })
    .catch(function (e) { fail(String(e && e.message || e)); });
})();
</script>
</body>
</html>
